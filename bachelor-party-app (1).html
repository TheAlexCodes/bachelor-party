<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palm Springs Bachelor Party - Travel Times</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .login-card p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 300px;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .traveler-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .traveler-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .you-badge {
            background: #667eea;
            color: white;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .time-section {
            margin-bottom: 15px;
        }

        .time-section:last-child {
            margin-bottom: 0;
        }

        .time-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .time-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .time-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .time-input:disabled {
            background: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }

        .time-display {
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 16px;
            color: #333;
        }

        .airport-info {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .save-btn {
            background: #10b981;
            margin-top: 15px;
        }

        .save-btn:hover {
            background: #059669;
        }

        .save-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 40px;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-message {
            background: #10b981;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }

        .error-message {
            background: #ef4444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }

        .logout-btn {
            background: transparent;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌴 Palm Springs Bachelor Party</h1>
            <p>February 19-22, 2026</p>
        </div>

        <div id="loginSection" class="login-card">
            <h2>Welcome!</h2>
            <p>Sign in with your Google account to view and edit your travel times</p>
            <button id="loginBtn" class="btn">Sign in with Google</button>
        </div>

        <div id="loadingSection" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading travel information...</p>
        </div>

        <div id="appSection" style="display: none;">
            <button id="logoutBtn" class="logout-btn">Sign Out</button>
            <div id="message"></div>
            <div id="travelersContainer"></div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        const API_KEY = 'AIzaSyBz2DgYLBEX8aXvekzIPm8tU1kFdhcsOLg';
        const CLIENT_ID = '627094757000-83vkgtaft21btuf2ngq6g7c4rp76u4gu.apps.googleusercontent.com';
        const SPREADSHEET_ID = '1kaynb25uR_Eue2O8o-M2IqeV1LAaYcnjp06NGRkb4xI';
        const RANGE = 'Agenda!A4:H13';
        
        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let accessToken = null;
        let userEmail = null;

        // Initialize Google API
        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
            });
            gapiInited = true;
        }

        // Initialize Google Identity Services
        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets',
                callback: '', // defined later
            });
            gisInited = true;
        }

        // Handle login
        document.getElementById('loginBtn').addEventListener('click', handleAuthClick);

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    throw (resp);
                }
                accessToken = resp.access_token;
                await loadTravelers();
            };

            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        // Load travelers data
        async function loadTravelers() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('loadingSection').style.display = 'block';

            try {
                const response = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: SPREADSHEET_ID,
                    range: RANGE,
                });

                const rows = response.result.values;
                displayTravelers(rows);

                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'block';
            } catch (err) {
                console.error('Error loading data:', err);
                showMessage('Error loading data. Please try again.', 'error');
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('loginSection').style.display = 'block';
            }
        }

        // Display travelers
        function displayTravelers(rows) {
            const container = document.getElementById('travelersContainer');
            container.innerHTML = '';

            rows.forEach((row, index) => {
                const name = row[2] || '';
                const arrival = row[5] || '';
                const departure = row[6] || '';
                const airport = row[7] || '';

                if (!name) return;

                const card = document.createElement('div');
                card.className = 'traveler-card';
                card.innerHTML = `
                    <div class="traveler-name">
                        ${name}
                    </div>
                    
                    <div class="time-section">
                        <div class="time-label">Arrival (2/19)</div>
                        <input type="text" 
                               class="time-input" 
                               id="arrival-${index}"
                               value="${arrival}"
                               placeholder="e.g., 10:36 AM">
                    </div>
                    
                    <div class="time-section">
                        <div class="time-label">Departure (2/22)</div>
                        <input type="text" 
                               class="time-input" 
                               id="departure-${index}"
                               value="${departure}"
                               placeholder="e.g., 7:20 PM">
                    </div>
                    
                    ${airport ? `<div class="airport-info">✈️ ${airport}</div>` : ''}
                    
                    <button class="btn save-btn" onclick="saveTimes(${index}, '${name}')">
                        Save My Times
                    </button>
                `;

                container.appendChild(card);
            });
        }

        // Save times back to Google Sheets
        async function saveTimes(rowIndex, name) {
            const arrivalInput = document.getElementById(`arrival-${rowIndex}`);
            const departureInput = document.getElementById(`departure-${rowIndex}`);
            
            const arrival = arrivalInput.value;
            const departure = departureInput.value;

            const actualRow = rowIndex + 4; // Rows start at 4 in the sheet
            
            try {
                // Update arrival time (column F)
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: SPREADSHEET_ID,
                    range: `Agenda!F${actualRow}`,
                    valueInputOption: 'USER_ENTERED',
                    resource: {
                        values: [[arrival]]
                    }
                });

                // Update departure time (column G)
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: SPREADSHEET_ID,
                    range: `Agenda!G${actualRow}`,
                    valueInputOption: 'USER_ENTERED',
                    resource: {
                        values: [[departure]]
                    }
                });

                showMessage(`✓ Times saved successfully for ${name}!`, 'success');
            } catch (err) {
                console.error('Error saving:', err);
                showMessage('Error saving times. Please try again.', 'error');
            }
        }

        // Show message
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = type === 'success' ? 'success-message' : 'error-message';
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            const token = gapi.client.getToken();
            if (token !== null) {
                google.accounts.oauth2.revoke(token.access_token);
                gapi.client.setToken('');
            }
            document.getElementById('appSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
        });

        // Load Google APIs
        window.gapiLoaded = gapiLoaded;
        window.gisLoaded = gisLoaded;
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
</body>
</html>
